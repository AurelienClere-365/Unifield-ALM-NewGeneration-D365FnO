trigger: none

pool:
  vmImage: 'windows-latest'

variables:
- group: MySecureVariables
  # Contains TenantId, ClientId, ClientSecret, SourceEnvironmentId, TargetEnvironmentId

jobs:
- job: CopyEnvironment
  displayName: "Power Platform Environment Copy"
  timeoutInMinutes: 360

  steps:

  # ---------------------------------------------------------
  # Step 1 — Install required PowerShell modules
  # ---------------------------------------------------------
  - task: PowerShell@2
    displayName: "Install Power Platform PowerShell modules"
    inputs:
      targetType: 'inline'
      script: |
        Install-Module -Name Microsoft.PowerApps.Administration.PowerShell -Force -Scope CurrentUser -AllowClobber -Verbose
        Install-Module -Name Microsoft.PowerApps.PowerShell -Force -Scope CurrentUser -AllowClobber -Verbose

  # ---------------------------------------------------------
  # Step 2 — Authenticate + Copy environment
  # ---------------------------------------------------------
  - task: PowerShell@2
    displayName: "Authenticate and copy Power Platform environment"
    timeoutInMinutes: 360   # Must be <= job timeout
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Authenticating with Add-PowerAppsAccount..."
        Add-PowerAppsAccount `
          -Endpoint prod `
          -TenantID "$(TenantId)" `
          -ApplicationId "$(ClientId)" `
          -ClientSecret "$(ClientSecret)" `
          -Verbose

        $copyToRequest = [pscustomobject]@{
            SourceEnvironmentId = "$(SourceEnvironmentId)"
            TargetEnvironmentName = "Copied from source"
            CopyType = "FullCopy"
            SkipAuditData = $true
            ExecuteAdvancedCopyForFinanceAndOperations = $true
        }

        Write-Host "Starting environment copy..."
        try {
            $result = Copy-PowerAppEnvironment `
                -EnvironmentName "$(TargetEnvironmentId)" `
                -CopyToRequestDefinition $copyToRequest `
                -WaitUntilFinished $true `
                -TimeoutInMinutes 360 `
                -Verbose `
                -ErrorAction Stop

            Write-Host "✅ Copy successfully started."
            Write-Host "Result: $($result | Out-String)"
        }
        catch {
            Write-Error "❌ Error during environment copy: $_"
            exit 1
        }
